{{ define "content" -}}
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    {{ if isset .Params "file" }}
    {{ $fileurl := .Params.file }}
    {{ if not (hasPrefix $fileurl "/") }}
      {{ $fileurl = print "files/papers/" $fileurl }}
    {{ end }}
    <p><a href="{{.Site.BaseURL}}{{ $fileurl }}">&rarr; Descargar PDF</a></p>
    {{ end }}
  </header>
  {{ if (.Params.mermaid) }}
  <!-- MermaidJS support -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true });
  </script>
  {{ end }}
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{- end }}
